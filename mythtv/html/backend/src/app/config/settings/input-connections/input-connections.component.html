<p-card class="m-8">
    <h2>{{ 'settings.iconnections.title' | translate }}</h2>
    <p-accordion class="col-span-12 w-full" (onClose)="onTabClose($event)" (onOpen)="onTabOpen($event)">

        @for (card of m_CaptureCardsFiltered; track $index; let ix = $index) {
        <p-accordion-panel [value]="ix">
            <p-accordion-header>
                {{card.CardType}}
                {{card.VideoDevice}}
                ({{card.DisplayName}})
                =&gt; {{videoSourceLookup[card.SourceId].SourceName}}
                {{dirtyMessages[ix]}}
            </p-accordion-header>
            <p-accordion-content>
                <app-iconnection [card]="m_CaptureCardsFiltered[ix]" [cardList]="m_CaptureCardList"
                    [videoSourceLookup]="videoSourceLookup" [videoSourceList]="videoSourceList" [parent]="this"
                    [tabIndex]="ix"></app-iconnection>
            </p-accordion-content>
        </p-accordion-panel>
        }
    </p-accordion>

    <div class="flex justify-end">
        <p-button class="p-4" label="{{ 'common.back' | translate }}"
            (onClick)="router.navigate(['setupwizard/video-sources'])" icon="pi pi-angle-left"
            iconPos="left"></p-button>

        <p-button class="p-4" label="{{ 'common.next' | translate }}"
            (onClick)="router.navigate(['setupwizard/channel-editor'])" icon="pi pi-angle-right"
            iconPos="right"></p-button>
    </div>

</p-card>
